            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        /* Admin Login Form */
        .form-wrapper {
            background: rgba(255, 255, 255, 0.95);
            max-width: 500px;
            width: 100%;
            padding: 50px 30px;
            border-radius: 10px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        .form-wrapper h2 {
            text-align: center;
            color: #2c7ad6;
            margin-bottom: 25px;
            font-size: 24px;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
            transition: 0.3s;
            font-size: 15px;
        }

        .form-group input:focus {
            border-color: #2c7ad6;
            box-shadow: 0 0 5px rgba(44, 122, 214, 0.3);
        }

        .form-wrapper input[type="submit"] {
            background-color: #2c7ad6;
            color: white;
            font-weight: bold;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            margin-top: 10px;
        }

        .form-wrapper input[type="submit"]:hover {
            background-color: #1b5fa0;
        }

        .form-wrapper p {
            font-size: 14px;
            margin-top: 10px;

        }

        .form-wrapper p a {
            color: #2c7ad6;
            text-decoration: none;
        }

        .form-wrapper p a:hover {
            text-decoration: underline;
        }

        /* Bottom / Contact Section */
        #down {
            background-color: #2c7ad6;
            color: white;
            text-align: center;
            padding: 20px 10px;
        }

        #down h3,
        #down h2 {
            margin-bottom: 10px;
        }

        #down a {

            margin: 5px;
            color: white;

        }
